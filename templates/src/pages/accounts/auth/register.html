{% extends 'src/layouts/auth.html' %}
{% load crispy_forms_tags %}


{% block title %}
    Регистрация
{% endblock title %}


{% block auth_content %}
<style>
    #div_id_usable_password {
        display: none;
    }
</style>
<div class="grid gap-4">
    <div class="text-center">
        <h1 class="text-xl font-semibold">Қош келдіңіз</h1>
        <span class="text-zinc-500">Платформаға тіркелу формасы</span>
    </div>
    
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
    
        <button type="submit"
            class="w-full px-3 py-2 text-sm font-medium text-center text-white bg-zinc-950 rounded-lg transition-all hover:bg-zinc-800 focus:ring-2 focus:outline-none focus:ring-zinc-500">
            Регистрация
        </button>
    </form>

    <div class="text-center">
        <span class="text-zinc-500">
            Егер аккаунт бар болса:
        </span>
        <a href="{% url 'login' %}" class="inline-flex items-center font-medium text-zinc-900 hover:underline transition-all">
            Жүйеге кіру
            <svg class="w-4 h-4 ms-2 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 5h12m0 0L9 1m4 4L9 9" />
            </svg>
        </a>
    </div>

</div>
{% endblock auth_content %}
