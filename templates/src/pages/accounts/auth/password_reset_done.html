{% extends 'src/layouts/auth.html' %}
{% load crispy_forms_tags %}


{% block title %}
    Парольді қалпына келтіру
{% endblock title %}


{% block auth_content %}
<div class="grid gap-4">
    <div class="text-center">
        <h1 class="text-xl font-semibold">Уайымдамаңыз!</h1>
        <span class="text-zinc-500">Тіркелген электронды поштаға хабарлама жіберілді</span>
    </div>
    
    <div class="text-center">
        <a href="{% url 'login' %}" class="inline-flex items-center font-medium text-zinc-900 hover:underline transition-all">
            Кері қайту
            <svg class="w-4 h-4 ms-2 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 5h12m0 0L9 1m4 4L9 9" />
            </svg>
        </a>
    </div>

</div>
{% endblock auth_content %}
